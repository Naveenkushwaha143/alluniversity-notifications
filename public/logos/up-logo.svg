<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0a2e28"/>
    </linearGradient>
    <linearGradient id="marble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F5F5DC"/>
      <stop offset="100%" style="stop-color:#FAEBD7"/>
    </linearGradient>
  </defs>
  <circle cx="100" cy="100" r="96" fill="url(#bg)" stroke="#2DD4BF" stroke-width="2"/>
  <!-- Taj Mahal simplified -->
  <!-- Base platform -->
  <rect x="40" y="120" width="120" height="8" rx="1" fill="url(#marble)" opacity="0.6"/>
  <rect x="50" y="112" width="100" height="10" rx="1" fill="url(#marble)" opacity="0.7"/>
  <!-- Main dome -->
  <path d="M 75 112 Q 75 65 100 50 Q 125 65 125 112 Z" fill="url(#marble)" opacity="0.85"/>
  <!-- Finial -->
  <line x1="100" y1="50" x2="100" y2="42" stroke="#2DD4BF" stroke-width="1.5" opacity="0.7"/>
  <circle cx="100" cy="40" r="3" fill="#2DD4BF" opacity="0.7"/>
  <!-- Minarets -->
  <rect x="45" y="80" width="6" height="32" fill="url(#marble)" opacity="0.5"/>
  <path d="M 45 80 Q 48 72 51 80" fill="url(#marble)" opacity="0.5"/>
  <circle cx="48" cy="76" r="2" fill="#2DD4BF" opacity="0.4"/>
  <rect x="149" y="80" width="6" height="32" fill="url(#marble)" opacity="0.5"/>
  <path d="M 149 80 Q 152 72 155 80" fill="url(#marble)" opacity="0.5"/>
  <circle cx="152" cy="76" r="2" fill="#2DD4BF" opacity="0.4"/>
  <!-- Small domes -->
  <path d="M 60 112 Q 60 98 68 95 Q 76 98 76 112 Z" fill="url(#marble)" opacity="0.6"/>
  <path d="M 124 112 Q 124 98 132 95 Q 140 98 140 112 Z" fill="url(#marble)" opacity="0.6"/>
  <!-- Central arch -->
  <path d="M 90 112 L 90 135 Q 100 142 110 135 L 110 112" fill="none" stroke="#0a1628" stroke-width="1" opacity="0.4"/>
  <!-- Reflection -->
  <rect x="50" y="130" width="100" height="3" rx="1" fill="#2DD4BF" opacity="0.15"/>
  <text x="100" y="162" font-family="sans-serif" font-size="9" fill="#2DD4BF" text-anchor="middle" opacity="0.7">UTTAR PRADESH</text>
</svg>